name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller CD_Companion.spec

      - name: Package executable zip
        run: |
          New-Item -ItemType Directory -Path dist/CD_Companion -Force
          Copy-Item -Path dist/CD_Companion.exe -Destination dist/CD_Companion/CD_Companion.exe -Force
          Compress-Archive -Path dist/CD_Companion -DestinationPath dist/CD_Companion.zip -Force

      - name: Package source zip
        run: |
          git archive HEAD --format=zip -o dist/CD_Companion_source_${{ github.ref_name }}.zip

      - name: Extract tag annotation as release notes
        run: |
          git fetch --tags --force
          git tag -l --format='%(contents)' "${{ github.ref_name }}" | Out-File -FilePath dist/release_notes.txt -Encoding utf8

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release_notes.txt
          files: |
            dist/CD_Companion.zip
            dist/CD_Companion_source_${{ github.ref_name }}.zip

      - name: Prepare release metadata
        id: meta
        run: |
          $raw = "${{ github.ref_name }}" -replace '^v', ''
          $parts = $raw -split '\.' | ForEach-Object { [int]$_ }
          $ver = $parts -join '.'
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload exe to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_EXE }}
          filename: dist/CD_Companion.zip
          version: ${{ steps.meta.outputs.version }}
          display_name: CD_Companion ${{ steps.meta.outputs.version }}
          file_category: main
          archive_existing_file: false

      - name: Upload source zip to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_SOURCE }}
          filename: dist/CD_Companion_source_${{ github.ref_name }}.zip
          version: ${{ steps.meta.outputs.version }}
          display_name: CD_Companion source ${{ steps.meta.outputs.version }}
          file_category: miscellaneous
          archive_existing_file: true
