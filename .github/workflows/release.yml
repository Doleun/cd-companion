name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller CD_Companion.spec

      - name: Package source zip
        run: |
          $items = Get-ChildItem -Path . -Exclude dist,build,__pycache__,'*.spec' | Select-Object -ExpandProperty FullName
          Compress-Archive -Path $items -DestinationPath dist/CD_Companion_source_${{ github.ref_name }}.zip -Force

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CD_Companion.exe
            dist/CD_Companion_source_${{ github.ref_name }}.zip
          body_path: CHANGELOG.md

      - name: Read release notes
        id: notes
        run: |
          $content = Get-Content -Path NEXUS_RELEASE_NOTES.md -Raw
          "body<<EOF" >> $env:GITHUB_OUTPUT
          $content >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Upload exe to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_EXE }}
          filename: dist/CD_Companion.exe
          version: ${{ github.ref_name }}
          display_name: CD_Companion ${{ github.ref_name }}
          description: ${{ steps.notes.outputs.body }}
          file_category: main
          archive_existing_file: true

      - name: Upload source zip to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_SOURCE }}
          filename: dist/CD_Companion_source_${{ github.ref_name }}.zip
          version: ${{ github.ref_name }}
          display_name: CD_Companion source ${{ github.ref_name }}
          description: ${{ steps.notes.outputs.body }}
          file_category: main
          archive_existing_file: true
